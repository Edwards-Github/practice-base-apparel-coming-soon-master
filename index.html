<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Base Apparel</title>
    <link rel="icon" href="assets/images/favicon-32x32.png" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
    <script src="script.js" defer></script>
  </head>
  <body>
    <header>
      <img src="assets/images/logo.svg" alt="Base Apparel Logo" class="logo" />
    </header>
    <main>
      <img
        src="assets/images/hero-mobile.jpg"
        alt="Picture of person modeling"
        class="picture"
      />
      <article class="container">
        <img
          src="assets/images/logo.svg"
          alt="Base Apparel Logo"
          class="desktop-logo"
        />
        <div class="text-container">
          <h1>We're <span>coming soon</span></h1>
          <p class="product-description">
            Hello fellow shoppers! We're currently building our new fashion
            store. Add your email below to stay up-to-date with announcements
            and our launch deals.
          </p>
          <div class="email-container">
            <input type="email" placeholder="Email Address" class="email" />
            <img
              src="assets/images/error.png"
              alt="error icon"
              class="error-icon"
            />
            <button class="button">
              <img
                src="assets/images/icon-arrow.svg"
                alt="arrow icon"
                class="arrow"
              />
            </button>
          </div>
          <p class="error-message">Please provide a valid email</p>
        </div>
      </article>
    </main>
  </body>
</html>
